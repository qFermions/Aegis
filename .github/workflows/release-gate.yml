name: Release Gate

# The same scanner that gates local commits, run across every tracked file
# on every push and PR — "the release gate ran once" becomes "the release
# gate runs publicly, forever." See EVALUATE.md probe 4 to fire it yourself.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Tests and full-tree scan (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out the full tree
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run the repository test suite
        run: node --test

      - name: Scan every tracked file (PII, credentials, secret formats, injection markers)
        # Tenant-literal gate (SR-8) activates only when the secrets are set;
        # the scanner redacts any match from its own output by design.
        env:
          AEGION_DOMAIN: ${{ secrets.AEGION_DOMAIN }}
          AEGION_ORG_NAME: ${{ secrets.AEGION_ORG_NAME }}
        run: node scripts/pre-commit-check.js --all
